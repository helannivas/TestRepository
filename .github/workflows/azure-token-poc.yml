name: Snowflake Key Rotation

on:
  workflow_dispatch:

jobs:

  # ── job 1: generate keys + upload to GCP ─────────
  generate-and-upload:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/58209193807/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account:            "snowflake-pipeline-sa@project-edaab515-4141-40a2-a68.iam.gserviceaccount.com"

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate key pair and upload
        run: bash generate_and_upload.sh

  # ── job 2: assign RSA_2 in Snowflake ─────────────
  rotate:
    runs-on: ubuntu-latest
    needs: generate-and-upload
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure via GitHub OIDC
        uses: azure/login@v2
        with:
          client-id:              "51a4cea1-294f-4b79-9fb0-24ce472ae3a3"
          tenant-id:              "cef8c081-d201-48a9-be90-7f38ac978991"
          allow-no-subscriptions: true

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/58209193807/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account:            "snowflake-pipeline-sa@project-edaab515-4141-40a2-a68.iam.gserviceaccount.com"

      - name: Install dependencies
        run: pip install azure-identity snowflake-connector-python google-cloud-secret-manager

      - name: Assign RSA_2 in Snowflake
        run: python3 call_snowflake.py

  # ── job 3: validate key pair works ───────────────
  validate-rsa2:
    runs-on: ubuntu-latest
    needs: rotate
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/58209193807/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account:            "snowflake-pipeline-sa@project-edaab515-4141-40a2-a68.iam.gserviceaccount.com"

      - name: Install dependencies
        run: |
          pip install google-cloud-secret-manager \
                      snowflake-connector-python \
                      cryptography

      - name: Validate key pair against Snowflake
        run: python3 test_keypair.py

  # ── job 4: promote RSA_2 → RSA_1 ─────────────────
  promote:
    runs-on: ubuntu-latest
    needs: validate-rsa2
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure via GitHub OIDC
        uses: azure/login@v2
        with:
          client-id:              "51a4cea1-294f-4b79-9fb0-24ce472ae3a3"
          tenant-id:              "cef8c081-d201-48a9-be90-7f38ac978991"
          allow-no-subscriptions: true

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/58209193807/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account:            "snowflake-pipeline-sa@project-edaab515-4141-40a2-a68.iam.gserviceaccount.com"

      - name: Install dependencies
        run: pip install azure-identity snowflake-connector-python google-cloud-secret-manager

      - name: Promote RSA_2 to RSA_1
        run: python3 promote_key.py

  validate-rsa1:
    runs-on: ubuntu-latest
    needs: promote
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/58209193807/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account:            "snowflake-pipeline-sa@project-edaab515-4141-40a2-a68.iam.gserviceaccount.com"
      - name: Install dependencies
        run: |
          pip install google-cloud-secret-manager \
                      snowflake-connector-python \
                      cryptography
      - name: Final validation — RSA_1 key pair
        run: python3 test_keypair.py
